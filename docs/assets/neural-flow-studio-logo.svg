<svg width="960" height="280" viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Neural Flow Studio logo</title>
  <desc id="desc">A neural network graph mark with connected nodes and the Neural Flow Studio wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="88" y1="44" x2="244" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.48" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="78" y1="140" x2="254" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softGlow" x="30" y="10" width="280" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.4 0 0 0 0 0.65 0 0 0 0 1 0 0 0 0.55 0"/>
      <feBlend mode="normal" in2="BackgroundImageFix" result="effect"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect" result="shape"/>
    </filter>
  </defs>

  <rect width="960" height="280" rx="28" fill="#111426"/>
  <rect x="1" y="1" width="958" height="278" rx="27" stroke="#2C3148" stroke-width="2"/>

  <g filter="url(#softGlow)">
    <rect x="64" y="44" width="204" height="192" rx="34" fill="#181C32" stroke="url(#markGradient)" stroke-width="4"/>
    <path d="M96 141C124 141 124 88 154 88C184 88 184 141 214 141C238 141 238 88 256 88" stroke="url(#lineGradient)" stroke-width="9" stroke-linecap="round"/>
    <path d="M96 141C124 141 124 194 154 194C184 194 184 141 214 141C238 141 238 194 256 194" stroke="url(#lineGradient)" stroke-width="9" stroke-linecap="round" opacity="0.82"/>

    <circle cx="96" cy="141" r="18" fill="#101426" stroke="#38BDF8" stroke-width="7"/>
    <circle cx="154" cy="88" r="18" fill="#101426" stroke="#7DD3FC" stroke-width="7"/>
    <circle cx="154" cy="194" r="18" fill="#101426" stroke="#34D399" stroke-width="7"/>
    <circle cx="214" cy="141" r="18" fill="#101426" stroke="#A78BFA" stroke-width="7"/>
    <circle cx="256" cy="88" r="13" fill="#34D399"/>
    <circle cx="256" cy="194" r="13" fill="#7DD3FC"/>
  </g>

  <g>
    <text x="330" y="124" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="0">
      Neural Flow
    </text>
    <text x="330" y="177" fill="#AAB2CC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="650" letter-spacing="0">
      Studio
    </text>
    <path d="M330 205H638" stroke="#2F3653" stroke-width="2" stroke-linecap="round"/>
    <text x="330" y="233" fill="#7DD3FC" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="18" font-weight="600" letter-spacing="0">
      Visual neural network builder
    </text>
  </g>
</svg>
